<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
     <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: "#050816",
              card: "#111827",
              accent: "#6366f1",
            },
          },
          borderRadius: {
            xl2: "1.375rem",
          },
          boxShadow: {
            soft: "0 18px 60px rgba(15, 23, 42, 0.75)",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate3d(0,0,0) scale(1)" },
              "100%": { transform: "translate3d(40px,-30px,0) scale(1.05)" },
            },
            floatCard: {
              "0%": {
                transform:
                  "translate3d(0,0,0) rotate3d(0, 1, 0, 7deg)",
              },
              "100%": {
                transform:
                  "translate3d(0,-8px,0) rotate3d(0, 1, 0, -7deg)",
              },
            },
            fadeUp: {
              "0%": { opacity: 0, transform: "translateY(18px)" },
              "100%": { opacity: 1, transform: "translateY(0)" },
            },
          },
          animation: {
            blob: "blob 18s ease-in-out infinite alternate",
            floatCard: "floatCard 9s ease-in-out infinite alternate",
            fadeUp: "fadeUp 0.7s ease-out forwards",
          },
        },
      },
    };
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
